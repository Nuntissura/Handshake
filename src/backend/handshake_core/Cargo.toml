[[bin]]
name = "peft_train"
path = "src/bin/peft_train.rs"
test = false

# MT-027 — headless driver for the a2 visual smoke focus audit. Runs the real
# `operator_foreground::focus_audit` FocusAuditHandle over a supplied run_id and
# prints the genuine FocusAuditReport JSON, so the smoke never hardcodes
# `handshake_owned_events: []`.
[[bin]]
name = "focus-audit-probe"
path = "src/bin/focus-audit-probe.rs"
test = false

[dependencies]
axum = { version = "0.7", features = ["ws"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = { package = "yaml_serde", version = "0.10" }
tokio = { version = "1", features = ["macros", "rt-multi-thread", "process", "sync", "time", "io-util"] }
tower-http = { version = "0.6", features = ["cors"] }
sqlx = { version = "0.8", default-features = false, features = ["runtime-tokio-rustls", "postgres", "macros", "migrate", "chrono", "uuid", "json"] }
uuid = { version = "1", features = ["v4", "v7", "fast-rng", "serde"] }
chrono = { version = "0.4", features = ["serde", "clock"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
tracing-appender = "0.2"
thiserror = "2.0.17"
duckdb = { version = "1.4.3", optional = true, features = ["bundled"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls"] }
eventsource-stream = "0.2"
keyring = { version = "3", optional = true, features = ["apple-native", "windows-native", "linux-native-sync-persistent", "crypto-rust"] }
secrecy = { version = "0.10", features = ["serde"] }
tokio-tungstenite = "0.26"
futures = "0.3"
futures-util = "0.3"
async-trait = "0.1"
once_cell = "1.20"
sha2 = "0.10"
blake3 = "1"
hex = "0.4"
# RustCrypto HMAC. Pairs with sha2::Sha256 to back the MT-029 / MT-030
# per-run shared-secret inspector envelope authentication (replaces the
# prior keyless SHA-256 envelope signature that any local process could
# forge).
hmac = "0.12"
subtle = "2"
# OS cryptographically-secure RNG for the MT-029 inspector per-run secret.
# Replaces Uuid::now_v7(), whose value embeds the launch millisecond and
# leaves only a small random tail; getrandom draws the secret straight from
# the operating-system CSPRNG so it carries no launch-time structure.
getrandom = "0.2"
# Half-precision float types for CRIT-1 / MT-088 SSM state-vector
# (de)serialization. Already a transitive dep via candle-core; declared
# directly so candle/ssm_state.rs can name half::f16 / half::bf16 when
# packing F16/BF16 SSM tensors to SSMTensorSnapshot bytes.
half = "2"
# Real AEAD cipher for MT-150 HBR test-packet corpus holdout encryption.
# RustCrypto/AEADs ChaCha20-Poly1305 implementation; standardised in RFC 8439.
# Replaces the prior hand-rolled SHA-256-CTR + HMAC-SHA256 construction that
# violated MT-150 minimum_control "real AEAD cipher; not a stub".
chacha20poly1305 = "0.10"
base64 = "0.22"
unicode-normalization = "0.1"
idna = "1"
caseless = "0.2"
bytes = { version = "1", features = ["serde"] }
globset = "0.4"
image = { version = "0.25", default-features = false, features = ["png", "jpeg"] }
tree-sitter = "0.24"
tree-sitter-rust = "0.23"
tree-sitter-javascript = "0.23"
tree-sitter-typescript = "0.23"
# Native engine crates stay behind an explicit feature until adapter MTs own host toolchain proof.
llama-cpp-2 = { version = "0.1.146", default-features = false, optional = true }
llama-cpp-sys-2 = { version = "0.1.146", default-features = false, optional = true }
candle-core = { version = "0.10.2", optional = true }
candle-nn = { version = "0.10.2", optional = true }
candle-transformers = { version = "0.10.2", optional = true }
tiktoken-rs = { version = "0.5", optional = true }
# Disable the esaxx default feature to avoid static CRT conflicts on Windows.
tokenizers = { version = "0.23.1", optional = true, default-features = false, features = ["onig", "progressbar"] }
regex = "1"
# Pure-Rust PDF parsing for WP-KERNEL-009 MT-086/MT-087 (knowledge_ingestion):
# real text-layer detection + page-text extraction, and programmatic fixture
# PDF generation in tests. MIT licensed (deny.toml-compatible), no native
# deps, no external daemon; the same crate pdf-extract builds on. Default
# features disabled: we parse/create only (no rayon, no embed-image stack).
lopdf = { version = "0.41", default-features = false }
zip = { version = "0.6", default-features = false, features = ["deflate"] }
jsonschema = { version = "0.17", features = ["draft202012"] }
which = "8"
icalendar = "0.17.10"
tokio-cron-scheduler = "0.15.1"
# Cross-platform PTY abstraction (wezterm). Backs the interactive Integrated
# Terminal PtySession: spawns a shell under a real pseudo-terminal (ConPTY on
# Windows, openpty on Unix) so xterm.js gets genuine TTY behavior. The crate
# manages the ConPTY console window itself; CREATE_NO_WINDOW is not regressed at
# any of the existing CLI/MCP/PEFT/screenshot spawn sites.
portable-pty = "0.9.0"

[dev-dependencies]
tempfile = "3"
wiremock = "0.6"

[target.'cfg(windows)'.dependencies]
rappct = { version = "0.13.3", default-features = false }
wineventhook = "0.11.0"
windows = { version = "0.62.2", features = ["Win32_Foundation", "Win32_UI_Input_KeyboardAndMouse", "Win32_UI_WindowsAndMessaging"] }
windows-sys = { version = "0.61", features = ["Win32_Foundation", "Win32_Graphics_Gdi", "Win32_Security", "Win32_Security_Authorization", "Win32_Storage_FileSystem", "Win32_System_Console", "Win32_System_JobObjects", "Win32_System_LibraryLoader", "Win32_System_Pipes", "Win32_System_Threading", "Win32_System_WindowsProgramming", "Win32_UI_Input_KeyboardAndMouse", "Win32_UI_WindowsAndMessaging"] }

