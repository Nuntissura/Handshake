[package]
name = "handshake_core"
version = "0.1.0"
edition = "2021"
license = "MIT"

[package.metadata.handshake.inspector_read_isolation]
source_globs = ["src/inspector_read/*.rs"]
deny_mutable_self_methods = true
deny_interior_mutability = true
deny_kernel_write_side_imports = [
  "crate::kernel::action_catalog",
  "crate::kernel::direct_edit_guard",
  "crate::kernel::kb003_promotion",
  "crate::kernel::pre_use_kernel_acceptance_run",
  "crate::kernel::validation::patch_proposal",
  "crate::kernel::write_boxes",
]

[lints.clippy]
assertions_on_constants = "allow"
await_holding_lock = "allow"
bind_instead_of_map = "allow"
cloned_ref_to_slice_refs = "allow"
collapsible_if = "allow"
collapsible_str_replace = "allow"
default_constructed_unit_structs = "allow"
derivable_impls = "allow"
disallowed_methods = "deny"
double_ended_iterator_last = "allow"
enum_variant_names = "allow"
explicit_auto_deref = "allow"
field_reassign_with_default = "allow"
io_other_error = "allow"
large_enum_variant = "allow"
manual_div_ceil = "allow"
manual_is_multiple_of = "allow"
manual_range_patterns = "allow"
manual_strip = "allow"
needless_lifetimes = "allow"
question_mark = "allow"
redundant_closure = "allow"
result_large_err = "allow"
sliced_string_as_bytes = "allow"
too_many_arguments = "allow"
unit_arg = "allow"
unnecessary_get_then_check = "allow"
unnecessary_lazy_evaluations = "allow"
unnecessary_map_or = "allow"
unnecessary_sort_by = "allow"
useless_format = "allow"
useless_vec = "allow"

[[bin]]
name = "handshake_core"
path = "src/main.rs"
required-features = ["app-runtime"]

[[bin]]
name = "capability_registry_workflow"
path = "src/bin/capability_registry_workflow.rs"
required-features = ["app-runtime"]

[[bin]]
name = "handshake"
path = "src/bin/handshake.rs"
test = false

[[bin]]
name = "mt046_token_probe"
path = "src/bin/mt046_token_probe.rs"
required-features = ["win-native-integration"]
test = false

# MT-058 — live Win32 foreground-steal payload for ESC-WIN32-FOREGROUND-INJECT
# (the HBR-QUIET-001 acid test). Built on the Windows CI lane with
# `--features win-native-integration`; produces
# `handshake-foreground-inject-probe.exe`, whose absolute path Cargo exposes to
# the integration-test crate as CARGO_BIN_EXE_handshake-foreground-inject-probe.
[[bin]]
name = "handshake-foreground-inject-probe"
path = "src/bin/handshake-foreground-inject-probe.rs"
required-features = ["win-native-integration"]
test = false

[[bin]]
name = "model_manual_md_gen"
path = "src/bin/model_manual_md_gen.rs"
test = false

[[bin]]
name = "handshake-swarm"
path = "src/bin/handshake-swarm.rs"
test = false

[[bin]]
name = "hsk-warm-agent"
path = "src/bin/hsk-warm-agent.rs"
test = false

[[bin]]
name = "hsk-warm-agent-package"
path = "src/bin/hsk-warm-agent-package.rs"
test = false

[[bin]]
name = "mt249_code_intelligence_fixture"
path = "src/bin/mt249_code_intelligence_fixture.rs"
required-features = ["runtime-full", "duckdb-flight-recorder"]
test = false

[[bin]]
name = "mt250_workspace_search_fixture"
path = "src/bin/mt250_workspace_search_fixture.rs"
required-features = ["runtime-full", "duckdb-flight-recorder"]
test = false

[[bin]]
