# WP-KERNEL-012 MT-089 — redirect the build target-dir to the EXTERNAL artifact root (CX-212E) so this
# crate NEVER creates a repo-local `target/` folder inside the worktree.
#
# Path depth: this crate dir is
#   <Handshake Worktrees>/wtc-native-editors-v1/src/frontend/palmistry
# and Handshake_Artifacts lives at
#   <Handshake Worktrees>/Handshake_Artifacts
# so we climb FOUR levels: palmistry -> frontend -> src -> wtc-native-editors-v1 -> <Handshake Worktrees>.
#
# MT-094 remediation: this used to point at `Handshake_Artifacts/palmistry-target`, but that layout
# NEVER materialized — real builds run from the worktree root (repo-root `.cargo/config.toml`), so
# palmistry artifacts actually land in `Handshake_Artifacts/handshake-cargo-target/debug/`. The stale
# sibling dir meant a cwd-inside-the-crate build created a SECOND cold target dir and the test
# binary-discovery fallbacks pointed at a directory that did not exist. Point at the REAL shared
# layout so every invocation (worktree root or crate dir) resolves to the same artifacts.
[build]
target-dir = "../../../../Handshake_Artifacts/handshake-cargo-target"
