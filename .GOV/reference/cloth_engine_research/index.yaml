    severity: medium
    detail: "No topic bridges the operator's real avatar pipeline (Avatar1 / ComfyUI 2D avatar / SMPL-X) to a 3D body proxy the solver can drape on — the missing first-mile input."
  - id: KI-STALE-COUNT
    severity: low
    detail: "01 says KernelEventType has 54 variants; actual is 66 (verified). Refresh."
  - id: KI-NAMING
    severity: medium
    detail: "Feature named 'Tailor' (operator, 2026-06-17) — see research_paper.naming. Tailor rename APPLIED across 00-12 (module/crate/tables/events/feature-prose -> Tailor; physics 'cloth', Garment* domain types, external project names, and T-* IDs preserved). Remaining for T-CONTRACTS: canonicalize event-variant + schema NAMES cross-file (each file is internally consistent but files still differ from each other); decide whether stable file_ids (e.g. cloth-engine-overview) get refreshed."

