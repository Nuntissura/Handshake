  - id: KI-MISSING-TOPICS
    severity: high
    detail: "T-TRIM-RIGID, T-UV-TEXTURE, T-ANIMATION (all MD moat features named in 00) are not authored. See planned_topics."
  - id: KI-CONTRACTS-DRIFT
    severity: high
    detail: "GarmentSpec defined 4x (cm vs mm; gather_ratio float vs M:N ints; fabric normalized [0,1] vs raw compliance) across 03/09/10/12; KernelEventType additions named inconsistently (Garment* vs Cloth* prefixes); body-proxy/avatar triple-defined with FKs to an undefined tailor_avatars table. Fix in T-CONTRACTS."
  - id: KI-MIGRATION-COLLISION
    severity: high
    detail: "Proposed 0334_tailor_garments.sql COLLIDES — 0334_loom_canvas_boards.sql already exists (verified). Four naming schemes used across files. Standardize on the codebase's dated convention (e.g. 2026_05_18_*)."
  - id: KI-DETERMINISM-VS-PROMOTION
    severity: high
    detail: "Solver determinism is scoped per-backend (04) but the promotion ValidationRunner (10) compares EXACT content hashes — spurious failures across GPU backends/drivers/sandbox containers. Resolve with tolerance-based mesh comparison, not exact hash."
  - id: KI-MISSING-OSS-REFS
    severity: medium
    detail: "NVIDIA Warp and XRTailor are load-bearing in the roadmap (07/12) but absent from the OSS inventory (11). Add them. Loro/yrs not evaluated vs the kernel's existing yjs_bridge for the geometry-merge risk."
